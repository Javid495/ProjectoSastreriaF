<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/RegistroNuevo.css">
    <title>Document</title>
</head>
<body>
    <main class="login">

        <!-- Imagen lateral -->
        <section class="login__image">
        <!-- Botón volver -->
        <button class="button">
            <a href="inicioSecion.html" class="icon icon--back"><img class="icons" src="images/InicioSecion/Vector.png" alt=""></a>
        </button>
        </section>

        <!-- Formulario -->
        <section class="login__form">

        <h1 class="login__title">Registrate</h1>

        <form class="form">

            <div class="form__group">
            <label class="form__label">Correo electrónico:</label>
            <input type="email" class="form__input form--email">
            </div>

            <div class="form__group">
            <label class="form__label">Nombre Usuario:</label>
            <input type="text" class="form__input form--usuario">
            </div>

            <div class="form__group">
            <label class="form__label">Contraseña:</label>
            <input type="password" class="form__input form--contra">
            </div>

            <div class="form__group">
            <label class="form__label">Telefono:</label>
            <input type="text" class="form__input form--tel">
            </div>

            <button class="form__button">Registrase</button>

            <p class="form__text">
            Ya tienes una cuenta <a href="inicioSecion.html">Inicia Sesion</a>
            </p>

        </form>
        </section>

        <script src="js/MandarBD/PruebaInsert.js"></script>
    </main>
</body>
</html>
