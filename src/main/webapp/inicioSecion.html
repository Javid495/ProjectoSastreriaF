<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/InicioSecion.css">
    <title>Document</title>
</head>
<body>
  <main class="login">

    <!-- Imagen lateral -->
    <section class="login__image">
      <!-- Botón volver -->
      <button class="button">
        <a href="index.html"><img class="icons  icon--back" src="images/InicioSecion/Vector.png" alt=""></a>
      </button>
    </section>

    <!-- Formulario -->
    <section class="login__form">

      <h1 class="login__title">Inicio de sesión</h1>

      <form class="form">

        <div class="form__group">
          <label class="form__label">Correo electrónico:</label>
          <input type="email" class="form__input">
        </div>

        <div class="form__group">
          <label class="form__label">Contraseña:</label>
          <input type="password" class="form__input">
        </div>

        <a href="#" class="form__link">¿Has olvidado la contraseña?</a>

        <button class="form__button">Iniciar sesión</button>

        <p class="form__text">
          No tienes una cuenta <a href="RegistroNuevo.html">Regístrate</a>
        </p>

        <button class="form__button form__button--google">
          <span class="icon icon--google"><img class="icons icons--gmail" src="images/InicioSecion/gmail.png" alt=""></span>
          Iniciar sesión con Google
        </button>

      </form>
    </section>

  </main>
</body>
</html>
